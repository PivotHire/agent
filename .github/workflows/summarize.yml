name: PivotHire Summary

on:
  push:
    branches: [main]
  pull_request:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send diff to PivotHire
        run: |
          DIFF=$(git diff HEAD~1 HEAD)
          curl -sf -X POST "${{ secrets.PIVOTHIRE_URL }}/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PIVOTHIRE_TOKEN }}" \
            -d @- <<EOF
          {
            "diff": $(echo "$DIFF" | jq -Rs .),
            "repo": "${{ github.repository }}",
            "commit_sha": "${{ github.sha }}",
            "author": "${{ github.actor }}",
            "branch": "${{ github.ref_name }}"
          }
          EOF
