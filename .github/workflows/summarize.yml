name: PivotHire Summary

on:
  push:
    branches: [main]
  pull_request:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send PR diff to PivotHire
        if: github.event_name == 'pull_request'
        run: |
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD)
          PR_TITLE=$(echo '${{ github.event.pull_request.title }}' | jq -Rs .)
          curl -sf -X POST "${{ secrets.PIVOTHIRE_URL }}/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PIVOTHIRE_TOKEN }}" \
            -d @- <<EOF
          {
            "diff": $(echo "$DIFF" | jq -Rs .),
            "repo": "${{ github.repository }}",
            "commit_sha": "${{ github.sha }}",
            "author": "${{ github.actor }}",
            "branch": "${{ github.head_ref }}",
            "event_type": "pr",
            "pr_number": ${{ github.event.pull_request.number }},
            "pr_title": ${PR_TITLE}
          }
          EOF

      - name: Send push diff to PivotHire
        if: github.event_name == 'push'
        run: |
          DIFF=$(git diff HEAD~1 HEAD)
          curl -sf -X POST "${{ secrets.PIVOTHIRE_URL }}/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PIVOTHIRE_TOKEN }}" \
            -d @- <<EOF
          {
            "diff": $(echo "$DIFF" | jq -Rs .),
            "repo": "${{ github.repository }}",
            "commit_sha": "${{ github.sha }}",
            "author": "${{ github.actor }}",
            "branch": "${{ github.ref_name }}",
            "event_type": "push"
          }
          EOF
